<!DOCTYPE html>
<html lang="es" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALGO::LAB | Java Engineering</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { 
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        javaRed: '#E7140D',
                        javaBlue: '#0073B7',
                    }
                }
            }
        };
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,600;0,800;1,800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; transition: all 0.3s ease; }
        .bg-pattern {
            background-image: radial-gradient(circle, currentColor 1px, transparent 1px);
            background-size: 25px 25px;
        }
        @keyframes steam {
            0% { transform: translateY(0) scaleX(1); opacity: 0; }
            50% { opacity: 0.8; }
            100% { transform: translateY(-20px) scaleX(1.5); opacity: 0; }
        }
        .steam-line { animation: steam 3s infinite ease-out; }
        .card-glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .light .card-glass {
            background: rgba(255, 255, 255, 0.8);
            border: 1px solid rgba(0, 0, 0, 0.05);
        }
    </style>
</head>
<body class="bg-zinc-50 dark:bg-zinc-950 text-zinc-900 dark:text-zinc-100 min-h-screen bg-pattern overflow-x-hidden selection:bg-javaBlue selection:text-white">

    <nav class="fixed top-0 w-full z-[100] p-4 md:p-6">
        <div class="max-w-7xl mx-auto backdrop-blur-2xl bg-white/80 dark:bg-zinc-900/80 rounded-3xl md:rounded-full px-6 py-3 flex items-center justify-between shadow-xl border border-black/5 dark:border-white/5">
            <div class="flex items-center gap-4">
                <svg viewBox="0 0 128 128" class="w-8 h-8">
                    <path d="M60 25c0 0 5-5 0-10M75 30c0 0 5-5 0-10" stroke="#E7140D" stroke-width="10" stroke-linecap="round"/>
                    <path d="M40 55 C 40 45, 100 45, 100 55 M35 75 C 35 65, 105 65, 105 75 M30 95 C 30 85, 110 85, 110 95 M100 55 C 120 55, 120 85, 100 85" 
                          fill="none" class="stroke-javaBlue dark:stroke-white" stroke-width="10" stroke-linecap="round"/>
                </svg>
                <span class="hidden xs:block font-black uppercase text-[10px] tracking-[0.3em] opacity-50">Algo::Lab</span>
            </div>
            <button id="themeToggle" class="p-3 rounded-2xl bg-zinc-100 dark:bg-zinc-800 hover:scale-110 transition-transform">
                <span class="dark:hidden">🌙</span><span class="hidden dark:inline">☀️</span>
            </button>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 md:px-8">
        <header class="min-h-screen flex flex-col items-center justify-center pt-24 pb-12">
            <div class="w-full max-w-4xl p-8 md:p-16 rounded-[3rem] md:rounded-[5rem] card-glass text-center relative overflow-hidden">
                <div class="absolute -top-20 -left-20 w-64 h-64 bg-javaRed/10 blur-[100px] rounded-full"></div>
                <div class="relative z-10 mb-8 transform hover:scale-105 transition-transform duration-700">
                    <svg class="w-40 h-40 md:w-64 md:h-64 mx-auto drop-shadow-2xl" viewBox="0 0 128 128">
                        <g stroke="#E7140D" stroke-width="4" stroke-linecap="round" fill="none">
                            <path class="steam-line" d="M60 30c0 0 5-5 0-10" style="animation-delay: 0s;"/>
                            <path class="steam-line" d="M75 35c0 0 5-5 0-10" style="animation-delay: 0.5s;"/>
                            <path class="steam-line" d="M90 30c0 0 5-5 0-10" style="animation-delay: 1s;"/>
                        </g>
                        <g class="stroke-javaBlue dark:stroke-white" stroke-width="7" stroke-linecap="round" fill="none">
                            <path d="M40 55 C 40 45, 100 45, 100 55 C 100 65, 40 65, 40 55" />
                            <path d="M35 75 C 35 65, 105 65, 105 75 C 105 85, 35 85, 35 75" />
                            <path d="M30 95 C 30 85, 110 85, 110 95 C 110 105, 30 105, 30 95" />
                            <path d="M100 55 C 120 55, 120 85, 100 85" stroke-width="6" />
                        </g>
                    </svg>
                </div>
                <h1 class="text-5xl md:text-8xl lg:text-9xl font-black italic uppercase tracking-tighter leading-none mb-6">
                    <span class="text-javaRed">Java</span><br>
                    <span class="text-zinc-400 dark:text-zinc-700">Platform</span>
                </h1>
                <p class="text-sm md:text-base font-bold uppercase tracking-[0.4em] opacity-30 italic">Engineering Environment // JDK 21</p>
            </div>
        </header>

        <section id="modulo-vectores" class="py-12">
            <div class="grid grid-cols-1 gap-8">
                <a href="pages/practicos.html?p=2" class="card-glass p-8 md:p-12 rounded-[2.5rem] md:rounded-[4rem] group flex flex-col md:flex-row justify-between items-start md:items-center gap-6 border-javaRed/20 hover:border-javaRed/50 transition-all">
                    <div class="space-y-4">
                        <div class="flex items-center gap-2">
                            <div class="w-10 h-1 bg-javaRed"></div>
                            <span class="text-javaRed font-black text-xs uppercase tracking-widest">Logic.Core</span>
                        </div>
                        <h2 class="text-4xl md:text-6xl font-black italic uppercase tracking-tighter group-hover:translate-x-2 transition-transform">Vectores & <br class="hidden md:block"> Sorting</h2>
                    </div>
                    <div class="text-7xl md:text-9xl font-black italic text-zinc-100 dark:text-zinc-900 group-hover:text-javaRed/20 transition-colors">01</div>
                </a>
            </div>
        </section>

        <section id="timeline-clases" class="py-20">
            <div class="flex items-center gap-4 mb-12 opacity-30 text-zinc-400">
                <span class="text-[10px] font-black uppercase tracking-[0.5em]">Logs_System</span>
                <div class="flex-1 h-[1px] bg-current"></div>
            </div>
            <div id="notes-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 md:gap-8"></div>
        </section>
    </main>

   <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
    import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore.js";
    import { diarioClases } from './js/data/apuntes.js';

    const firebaseConfig = {
        apiKey: "AIzaSyACn1WsQF2--cd_NT71D1GplZTuc2qu8cI",
        authDomain: "algo-lab-6ebad.firebaseapp.com",
        projectId: "algo-lab-6ebad",
        storageBucket: "algo-lab-6ebad.firebasestorage.app",
        messagingSenderId: "141165248345",
        appId: "1:141165248345:web:23dad0ce60ca1d8e449648",
        measurementId: "G-BYEM8M9ZJ0"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const themeToggle = document.getElementById('themeToggle');
    const applyTheme = () => {
        const saved = localStorage.getItem('theme') || 'dark';
        document.documentElement.classList.toggle('dark', saved === 'dark');
    };
    themeToggle.onclick = () => {
        const isDark = document.documentElement.classList.toggle('dark');
        localStorage.setItem('theme', isDark ? 'dark' : 'light');
    };
    applyTheme();

    async function render() {
        const grid = document.getElementById('notes-grid');
        grid.innerHTML = '<p class="col-span-full text-center opacity-30 italic animate-pulse">Syncing with Cloud Database...</p>';

        try {
            const q = query(collection(db, "clases"), orderBy("id", "desc"));
            const querySnapshot = await getDocs(q);
            const cloudNotes = [];
            querySnapshot.forEach((doc) => cloudNotes.push(doc.data()));

            const notesMap = new Map();
            // Primero cargamos las locales para que la nube siempre tenga la última palabra (override)
            diarioClases.forEach(n => notesMap.set(n.id, n));
            cloudNotes.forEach(cn => notesMap.set(cn.id, cn));
            
            const allNotes = Array.from(notesMap.values()).sort((a,b) => b.id - a.id);
            grid.innerHTML = '';

            // BOTÓN "+" CORREGIDO
            const maxId = allNotes.length > 0 ? Math.max(...allNotes.map(n => n.id)) : 0;
            const nextId = maxId + 1;
            
            const addCard = document.createElement('a');
            // Usamos ruta absoluta al servidor local para evitar errores de carpeta
            addCard.href = `./pages/apuntes.html?id=${nextId}&mode=edit`;
            addCard.className = "card-glass p-10 rounded-[2.5rem] flex items-center justify-center border-dashed border-2 border-zinc-300 dark:border-zinc-800 text-zinc-400 hover:border-javaRed hover:text-javaRed hover:scale-105 transition-all min-h-[250px]";
            addCard.innerHTML = `<span class="text-6xl font-light">+</span>`;
            grid.appendChild(addCard);

            allNotes.forEach(clase => {
                const card = document.createElement('a');
                card.href = `./pages/apuntes.html?id=${clase.id}`;
                card.className = "card-glass p-8 rounded-[2.5rem] group hover:scale-[1.02] flex flex-col justify-between min-h-[250px]";
                card.innerHTML = `
                    <div>
                        <div class="flex justify-between mb-6 text-[9px] font-black uppercase opacity-40">
                            <span>${clase.fecha || 'LOG'}</span>
                            <span class="text-javaRed">#${String(clase.id).padStart(2,'0')}</span>
                        </div>
                        <h4 class="text-lg font-black uppercase italic leading-tight group-hover:text-javaRed transition-colors">${clase.titulo}</h4>
                    </div>
                    <div class="pt-6 mt-6 border-t border-white/5 flex flex-wrap gap-2">
                         ${(clase.tags || []).slice(0, 2).map(t => `<span class="text-[8px] font-bold text-javaBlue uppercase">${t}</span>`).join('')}
                    </div>
                `;
                grid.appendChild(card);
            });
        } catch (e) {
            console.error("Error en Render:", e);
            grid.innerHTML = '<p class="col-span-full text-center text-javaRed font-black">ERROR_DB_SYNC_FAILED</p>';
        }
    }

    render();
</script>
</body>
</html>
