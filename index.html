<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore.js";
import { diarioClases } from './js/data/apuntes.js';

const firebaseConfig={
apiKey:"AIzaSyACn1WsQF2--cd_NT71D1GplZTuc2qu8cI",
authDomain:"algo-lab-6ebad.firebaseapp.com",
projectId:"algo-lab-6ebad",
storageBucket:"algo-lab-6ebad.firebasestorage.app",
messagingSenderId:"141165248345",
appId:"1:141165248345:web:23dad0ce60ca1d8e449648"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

const themeToggle=document.getElementById('themeToggle');

const applyTheme=()=>{
const saved=localStorage.getItem('theme')||'dark';
document.documentElement.classList.toggle('dark',saved==='dark');
};

themeToggle.onclick=()=>{
const isDark=document.documentElement.classList.toggle('dark');
localStorage.setItem('theme',isDark?'dark':'light');
};

applyTheme();

async function render(){

const grid=document.getElementById('notes-grid');

grid.innerHTML=
'<p class="col-span-full text-center opacity-30 italic animate-pulse">Loading class notes...</p>';

try{

const q=query(collection(db,"clases"),orderBy("id","desc"));

const querySnapshot=await getDocs(q);

const cloudNotes=[];

querySnapshot.forEach(doc=>cloudNotes.push(doc.data()));

const notesMap=new Map();

diarioClases.forEach(n=>notesMap.set(n.id,n));
cloudNotes.forEach(cn=>notesMap.set(cn.id,cn));

const allNotes=Array.from(notesMap.values()).sort((a,b)=>b.id-a.id);

grid.innerHTML='';

const maxId=allNotes.length>0?Math.max(...allNotes.map(n=>n.id)):0;

const nextId=maxId+1;

const addCard=document.createElement('a');

addCard.href=`./pages/apuntes.html?id=${nextId}&mode=edit`;

addCard.className="card-glass p-10 rounded-[2.5rem] flex items-center justify-center border-dashed border-2 border-zinc-300 dark:border-zinc-800 text-zinc-400 hover:border-javaRed hover:text-javaRed hover:scale-105 transition-all min-h-[250px]";

addCard.innerHTML=`<span class="text-6xl font-light">+</span>`;

grid.appendChild(addCard);

allNotes.forEach(clase=>{

const card=document.createElement('a');

card.href=`./pages/apuntes.html?id=${clase.id}`;

card.className="card-glass p-8 rounded-[2.5rem] group hover:scale-[1.02] flex flex-col justify-between min-h-[250px]";

card.innerHTML=`

<div>

<div class="flex justify-between mb-6 text-[9px] font-black uppercase opacity-40">

<span>${clase.fecha||'LOG'}</span>
<span class="text-javaRed">#${String(clase.id).padStart(2,'0')}</span>

</div>

<h4 class="text-lg font-black uppercase italic leading-tight group-hover:text-javaRed transition-colors">

${clase.titulo}

</h4>

</div>

<div class="pt-6 mt-6 border-t border-white/5 flex flex-wrap gap-2">

${(clase.tags||[]).slice(0,2).map(t=>`<span class="text-[8px] font-bold text-javaBlue uppercase">${t}</span>`).join('')}

</div>

`;

grid.appendChild(card);

});

}catch(e){

console.error(e);

grid.innerHTML='<p class="col-span-full text-center text-javaRed font-black">ERROR_DB_SYNC_FAILED</p>';

}

}

render();

</script>
