<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vectores | ALGO::LAB Engineering</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { 
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        javaRed: '#FF0000',
                        javaBlue: '#0059b3',
                        obsidian: '#050506',
                        zinc950: '#09090b',
                        zinc900: '#121214',
                    }
                }
            }
        };
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,600;0,800;1,800&family=Fira+Code:wght@400;500&display=swap');
        
        body { font-family: 'Plus Jakarta Sans', sans-serif; transition: all 0.4s ease; }
        
        .glass-surface { 
            background: rgba(255, 255, 255, 0.7); 
            backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 0, 0, 0.05);
        }
        .dark .glass-surface { 
            background: rgba(18, 18, 20, 0.8); 
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        /* FIX DE VISIBILIDAD PARA NÚMEROS DEL ARRAY */
        #array-container span, 
        #array-container div { 
            color: #09090b !important; /* Zinc-950 */
            font-weight: 800;
        }

        .dark #array-container span, 
        .dark #array-container div { 
            color: #f4f4f5 !important; /* Zinc-100 */
        }

        /* Animación de los nodos del array */
        .array-node {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(0, 0, 0, 0.1);
        }
        .dark .array-node {
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.02);
        }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #FF0000; border-radius: 10px; }
    </style>
</head>
<body class="bg-[#fafafa] dark:bg-zinc-950 text-zinc-900 dark:text-zinc-100 selection:bg-javaRed selection:text-white overflow-x-hidden">

    <nav class="h-16 border-b border-black/5 dark:border-white/5 flex items-center px-6 justify-between glass-surface sticky top-0 z-[100]">
        <div class="flex items-center gap-4">
            <a href="../index.html" class="flex items-center gap-2 group">
                <svg class="w-6 h-6 text-javaRed group-hover:-translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M15 19l-7-7 7-7" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>
                <span class="font-extrabold italic uppercase tracking-tighter text-xl">ALGO<span class="text-javaRed">::</span>LAB</span>
            </a>
        </div>
        
        <div class="flex items-center gap-4">
            <button id="themeToggle" class="w-10 h-10 rounded-xl bg-black/5 dark:bg-white/5 flex items-center justify-center hover:scale-110 transition-all border border-black/5 dark:border-white/10">
                <span id="themeIcon">🌙</span>
            </button>
        </div>
    </nav>

    <div class="flex flex-col lg:flex-row min-h-[calc(100vh-4rem)]">
        
        <aside class="w-full lg:w-72 border-r border-black/5 dark:border-white/5 p-6 bg-white dark:bg-zinc-900/50">
            <div class="flex items-center gap-2 mb-8">
                <div class="w-1 h-4 bg-javaRed rounded-full"></div>
                <h3 class="text-[11px] font-black text-zinc-400 dark:text-zinc-500 uppercase tracking-[0.2em]">Module_Tasks</h3>
            </div>
            <div id="exercise-nav" class="space-y-1">
                </div>
        </aside>

        <main class="flex-1 p-6 md:p-12 space-y-10 bg-transparent overflow-y-auto">
            
            <header>
                <span id="complexity-badge" class="inline-block px-3 py-1 bg-javaRed/10 text-javaRed text-[9px] font-black rounded-full border border-javaRed/20 uppercase tracking-widest mb-4"></span>
                <h1 id="ex-title" class="text-4xl md:text-5xl font-extrabold italic uppercase tracking-tighter dark:text-white text-zinc-900 leading-none"></h1>
                <p id="ex-letra" class="text-zinc-500 dark:text-zinc-400 mt-6 text-lg font-light leading-relaxed max-w-4xl italic"></p>
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mt-10">
                    <div class="p-6 rounded-[2rem] bg-white dark:bg-zinc-900 border border-black/5 dark:border-white/5 shadow-sm">
                        <h4 class="text-[10px] font-black text-javaBlue uppercase tracking-widest mb-2 italic">@PreCondition</h4>
                        <p id="ex-pre" class="text-xs text-zinc-500 dark:text-zinc-400 font-medium"></p>
                    </div>
                    <div class="p-6 rounded-[2rem] bg-white dark:bg-zinc-900 border border-black/5 dark:border-white/5 shadow-sm">
                        <h4 class="text-[10px] font-black text-javaRed uppercase tracking-widest mb-2 italic">@PostCondition</h4>
                        <p id="ex-pos" class="text-xs text-zinc-500 dark:text-zinc-400 font-medium"></p>
                    </div>
                </div>
            </header>

            <section id="visualizer-section" class="glass-surface rounded-[3rem] p-8 md:p-12 min-h-[450px] flex flex-col shadow-2xl relative border border-white/10">
                <div class="absolute top-8 left-10 flex items-center gap-2">
                    <div class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div>
                    <span class="text-[9px] font-black uppercase tracking-[0.2em] text-zinc-400">Heap_Memory_View</span>
                </div>

                <div id="array-container" class="flex-1 flex items-end justify-center gap-3 border-b border-black/5 dark:border-white/10 pb-10 min-h-[200px]">
                </div>

                <div class="flex flex-col md:flex-row justify-between items-center mt-10 gap-6">
                    <div class="flex flex-col">
                        <span class="text-[9px] font-black uppercase text-zinc-400 tracking-widest">Logic_Hint</span>
                        <p id="ex-tip" class="text-sm text-javaBlue dark:text-blue-400 font-bold italic"></p>
                    </div>
                    <button id="btn-run" class="w-full md:w-auto px-10 py-4 bg-javaRed text-white rounded-2xl font-black text-[11px] uppercase tracking-[0.2em] hover:scale-105 hover:rotate-1 active:scale-95 transition-all shadow-xl shadow-javaRed/30 border-none">
                        Compile & Execute
                    </button>
                </div>
            </section>

            <footer class="p-8 rounded-[2.5rem] bg-zinc-900 dark:bg-white text-white dark:text-zinc-900 relative overflow-hidden">
                <div class="relative z-10">
                    <h4 class="text-[10px] font-black uppercase tracking-[0.4em] mb-4 opacity-50">Theoretical_Foundations</h4>
                    <p id="ex-theory" class="text-sm md:text-base leading-relaxed font-light italic"></p>
                </div>
                <div class="absolute -bottom-6 -right-6 text-6xl font-black italic opacity-5 select-none uppercase">Theory</div>
            </footer>
        </main>

        <aside class="w-full lg:w-[550px] border-l border-black/5 dark:border-white/5 bg-zinc-900 dark:bg-obsidian flex flex-col">
            <div class="p-6 border-b border-white/5 flex items-center justify-between">
                <h3 class="text-[11px] font-black text-zinc-500 uppercase tracking-[0.4em]">Source_Code.java</h3>
                <div class="flex gap-1">
                    <div class="w-2 h-2 rounded-full bg-zinc-700"></div>
                    <div class="w-2 h-2 rounded-full bg-zinc-700"></div>
                    <div class="w-2 h-2 rounded-full bg-javaRed"></div>
                </div>
            </div>
            <div class="flex-1 p-6 overflow-hidden flex flex-col">
                <div class="bg-black/40 rounded-3xl p-6 border border-white/5 flex-1 overflow-auto code-container">
                    <pre class="text-[13px] font-mono leading-relaxed"><code id="ex-code" class="text-zinc-300"></code></pre>
                </div>
                <p class="mt-4 text-[10px] font-medium text-zinc-600 italic">Compilando con el estándar Java SE 21...</p>
            </div>
        </aside>
    </div>

    <script>
        const btn = document.getElementById('themeToggle');
        const icon = document.getElementById('themeIcon');
        const html = document.documentElement;

        function updateIcon() {
            icon.innerText = html.classList.contains('dark') ? '☀️' : '🌙';
        }

        btn.addEventListener('click', () => {
            html.classList.toggle('dark');
            localStorage.theme = html.classList.contains('dark') ? 'dark' : 'light';
            updateIcon();
        });

        updateIcon();
    </script>
    <script src="../js/pages/practicos.js" type="module"></script>
</body>
</html>
