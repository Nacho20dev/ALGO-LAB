<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALGO::LAB | Ingeniería de Software</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script>
        tailwind.config = { 
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        javaRed: '#FF0000',
                        javaBlue: '#0059b3',
                    }
                }
            }
        };
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,600;0,800;1,800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; transition: background 0.3s, color 0.3s; }
        .editable:focus { outline: none; background: rgba(255, 0, 0, 0.05); border-radius: 8px; padding: 2px 4px; }
        .dark .editable:focus { background: rgba(255, 0, 0, 0.15); }
        pre code { white-space: pre-wrap; word-break: break-all; }
    </style>
</head>
<body class="bg-zinc-50 dark:bg-zinc-950 text-zinc-900 dark:text-zinc-100 min-h-screen pb-40 selection:bg-javaRed selection:text-white">

    <nav class="h-20 flex items-center px-6 md:px-12 justify-between border-b border-black/5 dark:border-white/5 sticky top-0 z-50 backdrop-blur-xl bg-white/70 dark:bg-zinc-950/70">
        <div class="flex items-center gap-3">
            <a href="../index.html" class="w-8 h-8 rounded-lg bg-javaRed flex items-center justify-center text-white font-bold text-xs shadow-lg shadow-javaRed/20 hover:scale-110 transition-transform">←</a>
            <span class="text-[10px] font-black uppercase tracking-[0.3em] text-zinc-400 italic">Root_Directory</span>
        </div>
        <div class="flex items-center gap-4">
            <div id="status-badge" class="hidden sm:block px-4 py-1.5 bg-zinc-100 dark:bg-zinc-900 rounded-full text-[9px] font-black text-zinc-400 uppercase tracking-widest border border-black/5 dark:border-white/5">👁️ Modo Lectura</div>
            <button id="themeToggle" class="w-10 h-10 rounded-xl bg-zinc-100 dark:bg-zinc-900 flex items-center justify-center border border-black/5 dark:border-white/10 text-xl">🌙</button>
        </div>
    </nav>

    <div class="fixed bottom-8 left-1/2 -translate-x-1/2 flex items-center gap-3 z-[100] bg-white/80 dark:bg-zinc-900/80 p-3 rounded-[2.5rem] border border-black/5 dark:border-white/10 backdrop-blur-2xl shadow-2xl scale-110">
        <button id="btn-pdf-pro" class="px-6 py-3 bg-zinc-900 text-white dark:bg-white dark:text-zinc-900 rounded-2xl text-[10px] font-black uppercase tracking-widest hover:bg-javaRed hover:text-white dark:hover:bg-javaRed dark:hover:text-white transition-all">Export_PDF</button>
        <button id="btn-edit" class="px-6 py-3 bg-white dark:bg-zinc-800 border border-black/5 dark:border-white/10 rounded-2xl text-[10px] font-black uppercase tracking-widest hover:border-javaRed transition-all">Editar</button>
        <button id="btn-save" class="hidden px-8 py-3 bg-javaRed text-white rounded-2xl text-[10px] font-black uppercase tracking-widest shadow-xl shadow-javaRed/20 animate-pulse">Save_Changes</button>
        <button id="btn-delete" class="w-12 h-12 flex items-center justify-center border border-red-500/20 text-red-500 rounded-2xl hover:bg-red-500 hover:text-white transition-all">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
    </div>

    <main class="max-w-5xl mx-auto px-6 md:px-12 pt-12 md:pt-20">
        <header class="mb-16">
            <div class="flex items-center gap-4 mb-8">
                <span id="clase-id" class="text-javaRed font-black italic text-2xl tracking-tighter">#--</span>
                <div class="h-[1px] flex-1 bg-zinc-200 dark:bg-zinc-800"></div>
                <span id="clase-fecha" class="editable text-[10px] font-black text-zinc-400 uppercase tracking-[0.4em]">FECHA</span>
            </div>
            <h1 id="clase-titulo" class="editable text-5xl md:text-8xl font-extrabold tracking-tighter uppercase italic leading-[0.85] mb-8 dark:text-white text-zinc-900 italic">CARGANDO...</h1>
            <div class="flex gap-3">
                <div class="px-3 py-1 bg-javaBlue/10 rounded-md border border-javaBlue/20">
                    <span id="clase-tags" class="editable text-javaBlue text-[9px] font-black uppercase tracking-widest italic">#TAGS</span>
                </div>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-12 lg:gap-16">
            <div class="lg:col-span-8 space-y-12">
                <section class="relative pl-6 border-l-4 border-zinc-200 dark:border-zinc-800">
                    <span class="text-[9px] font-black text-zinc-400 uppercase tracking-[0.3em] mb-4 block italic">Technical_Briefing</span>
                    <p id="clase-resumen" class="editable text-xl text-zinc-600 dark:text-zinc-400 leading-relaxed font-light italic">Resumen del log técnico...</p>
                </section>

                <section class="rounded-[2.5rem] overflow-hidden border border-black/5 dark:border-white/10 shadow-2xl bg-zinc-950">
                    <div class="bg-zinc-900 px-6 py-3 flex items-center justify-between border-b border-white/5">
                        <span class="text-[9px] font-black text-zinc-500 uppercase tracking-widest italic">Source_Execution</span>
                        <div class="flex gap-1.5"><div class="w-2.5 h-2.5 rounded-full bg-zinc-800"></div><div class="w-2.5 h-2.5 rounded-full bg-javaRed"></div></div>
                    </div>
                    <pre class="p-8 text-zinc-300 font-mono text-[13px] leading-relaxed overflow-x-auto"><code id="clase-codigo" class="editable block min-h-[100px]">System.out.println("Cargando código...");</code></pre>
                </section>
            </div>

            <aside class="lg:col-span-4 space-y-8">
                <div class="p-8 rounded-[2rem] border-l-4 border-javaRed bg-white dark:bg-zinc-900 shadow-xl shadow-black/5">
                    <span class="text-[8px] font-black text-zinc-400 uppercase block mb-4 italic tracking-[0.3em]">The_Core_Logic</span>
                    <p id="clase-joya" class="editable text-lg font-bold text-zinc-800 dark:text-zinc-100 italic leading-snug">"Tip técnico del día."</p>
                </div>
            </aside>
        </div>
    </main>

    <script type="module">
        import { diarioClases } from '../js/data/apuntes.js';
        const { jsPDF } = window.jspdf;

        // --- CARGA DINÁMICA ---
        const params = new URLSearchParams(window.location.search);
        const claseId = parseInt(params.get('id'));
        const mode = params.get('mode');

        const localNotes = JSON.parse(localStorage.getItem('algo_lab_notes')) || [];
        let claseData = localNotes.find(n => n.id === claseId) || diarioClases.find(c => c.id === claseId);

        if (claseData) {
            document.getElementById('clase-id').innerText = `#${String(claseData.id).padStart(2, '0')}`;
            document.getElementById('clase-fecha').innerText = (claseData.fecha || "LOG_ENTRY").toUpperCase();
            document.getElementById('clase-titulo').innerText = claseData.titulo;
            document.getElementById('clase-tags').innerText = Array.isArray(claseData.tags) ? claseData.tags.join(' ') : claseData.tags;
            document.getElementById('clase-resumen').innerText = claseData.resumen;
            document.getElementById('clase-codigo').innerText = claseData.codigo;
            document.getElementById('clase-joya').innerText = claseData.joya;
        } else {
            document.getElementById('clase-id').innerText = `#${String(claseId).padStart(2, '0')}`;
            document.getElementById('clase-titulo').innerText = "NUEVA_ENTRADA_LOG";
        }

        // Si entramos en modo edit desde el index
        if(mode === 'edit') setTimeout(() => toggleEdit(true), 500);

        // --- TEMA ---
        const themeToggle = document.getElementById('themeToggle');
        themeToggle.onclick = () => {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.theme = isDark ? 'dark' : 'light';
            themeToggle.innerText = isDark ? '☀️' : '🌙';
        };

        // --- EDICIÓN ---
        const fields = ['titulo', 'resumen', 'codigo', 'joya', 'fecha', 'tags'];
        const btnEdit = document.getElementById('btn-edit');
        const btnSave = document.getElementById('btn-save');

        function toggleEdit(enable) {
            fields.forEach(f => {
                const el = document.getElementById(`clase-${f}`);
                if(el) el.contentEditable = enable;
            });
            btnEdit.classList.toggle('hidden', enable);
            btnSave.classList.toggle('hidden', !enable);
            document.getElementById('status-badge').innerText = enable ? "🛠️ Modo Edición" : "👁️ Modo Lectura";
            document.getElementById('status-badge').classList.toggle('text-javaRed', enable);
        }

        btnEdit.onclick = () => toggleEdit(true);

        btnSave.onclick = () => {
            const updated = {
                id: claseId,
                fecha: document.getElementById('clase-fecha').innerText,
                titulo: document.getElementById('clase-titulo').innerText,
                tags: document.getElementById('clase-tags').innerText.split(' '),
                resumen: document.getElementById('clase-resumen').innerText,
                codigo: document.getElementById('clase-codigo').innerText,
                joya: document.getElementById('clase-joya').innerText
            };

            let currentLocal = JSON.parse(localStorage.getItem('algo_lab_notes')) || [];
            const idx = currentLocal.findIndex(n => n.id === claseId);
            if(idx > -1) currentLocal[idx] = updated;
            else currentLocal.push(updated);
            
            localStorage.setItem('algo_lab_notes', JSON.stringify(currentLocal));
            toggleEdit(false);
            alert("LOG_SAVED: Cambios en memoria local.");
        };

        document.getElementById('btn-delete').onclick = () => {
            if(confirm("¿Eliminar registro?")) {
                let currentLocal = JSON.parse(localStorage.getItem('algo_lab_notes')) || [];
                localStorage.setItem('algo_lab_notes', JSON.stringify(currentLocal.filter(n => n.id !== claseId)));
                window.location.href = '../index.html';
            }
        };

        // --- PDF ---
        document.getElementById('btn-pdf-pro').onclick = () => {
            const doc = new jsPDF();
            const isDark = document.documentElement.classList.contains('dark');
            doc.setFillColor(isDark ? 10 : 250);
            doc.rect(0,0,210,297,'F');
            doc.setTextColor(isDark ? 255 : 0);
            doc.setFontSize(20);
            doc.text(document.getElementById('clase-titulo').innerText, 20, 40);
            doc.setFontSize(10);
            doc.text(document.getElementById('clase-resumen').innerText, 20, 60, {maxWidth: 170});
            doc.save(`AlgoLab_Log_${claseId}.pdf`);
        };
    </script>
</body>
</html>
